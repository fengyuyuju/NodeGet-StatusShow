<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Next-generation server monitoring and management tools" />
    <link rel="icon" type="image/png" href="./logo.png" />
    <title>NodeGet - StatusShow</title>
    <script>
      var pref = 'system'
      try {
        var stored = localStorage.getItem('nodeget.theme')
        if (stored === 'light' || stored === 'dark' || stored === 'system') pref = stored
      } catch (_) {}
      try {
        var sysDark =
          typeof window.matchMedia !== 'function' ||
          window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.classList.toggle(
          'dark',
          pref === 'dark' || (pref === 'system' && sysDark),
        )
      } catch (_) {}
    </script>
    <link rel="stylesheet" href="./custom.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="./custom.js" defer></script>
  </body>
</html>
